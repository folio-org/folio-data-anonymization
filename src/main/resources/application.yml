spring:
  application:
    name: data-anon
  datasource:
    username: ${DB_USERNAME:folio}
    password: ${DB_PASSWORD:postgres_password_123!}
    url: jdbc:postgresql://${DB_HOST:rds-folio-etesting-data-anonymization.cluster-cdxr1geeeqbb.us-west-2.rds.amazonaws.com}:${DB_PORT:5432}/${DB_DATABASE:folio}
  sql:
    init:
      # to boot up application despite of any DB connection issues
      continue-on-error: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

logging:
  level:
    org:
      jooq: DEBUG
