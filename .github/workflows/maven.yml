name: Maven central workflow

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maven:
    uses: folio-org/.github/.github/workflows/maven.yml@test-gh-packages #
    # Only handle push events from the main branch or tags, to decrease PR noise
    if: github.ref_name == github.event.repository.default_branch ||
      github.event_name != 'push' || github.ref_type == 'tag' || github.actor == 'renovate[bot]'
    secrets: inherit # NOSONAR
    permissions:
      contents: read
      packages: write
    with:
      publish-module-descriptor: false
      do-docker: false
      do-sonar-scan: false # done at PR level
