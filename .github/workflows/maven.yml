name: Maven central workflow

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maven:
    uses: folio-org/.github/.github/workflows/maven.yml@78e23d8eee403c7252b6185ac1a01879c0829b8e # v1
    # Only handle push events from the main branch or tags, to decrease PR noise
    if: github.ref_name == github.event.repository.default_branch ||
      github.event_name != 'push' || github.ref_type == 'tag'
    secrets: inherit # NOSONAR
    with:
      publish-module-descriptor: false
      do-docker: false
      do-sonar-scan: false # done at PR level
